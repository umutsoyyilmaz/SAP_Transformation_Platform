# ═══════════════════════════════════════════════════════════════════════════
# SAP Transformation Platform — CI Pipeline
# Sprint 14: CI/CD + Security Hardening
#
# Triggers: push to main, pull requests to main
# Jobs: lint → test → build (Docker) → deploy (staging)
# ═══════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  # ── Test ──────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          APP_ENV: testing
          GEMINI_API_KEY: ""
        run: |
          python -m pytest tests/ \
            -v --tb=short \
              --deselect tests/test_management/test_api_testing.py::TestTraceabilityMatrix \
              --deselect tests/quality/test_reporting.py::TestTraceabilityMatrixReport \
            -m "not performance and not ai_accuracy" \
            --junitxml=test-results/results.xml

      - name: Project-Scope Regression Pack
        env:
          APP_ENV: testing
          GEMINI_API_KEY: ""
        run: |
          chmod +x scripts/testing/ci_project_scope_regression.sh
          bash scripts/testing/ci_project_scope_regression.sh

      - name: TM Integrity Gate
        env:
          APP_ENV: testing
          GEMINI_API_KEY: ""
        run: |
          python -m pytest \
            tests/test_management/test_tm_release_gate.py \
            tests/ui_contracts/test_test_management_ui_contract.py \
            tests/test_management/test_api_testing.py -k "overview_summary or execution_center or execution_history or TestTraceabilityMatrix or TestDashboard" \
            -v --tb=short

      - name: TM Migration Smoke
        env:
          APP_ENV: testing
          GEMINI_API_KEY: ""
        run: |
          python scripts/testing/tm_migration_smoke.py

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/results.xml

  # ── Docker Build & Push ──────────────────────────────────────────────
  build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Staging Deploy ───────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to staging (Railway / Fly.io)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "❌ DEPLOY_TOKEN is not configured for staging deploy"
            exit 1
          fi

          if [ -z "$DEPLOY_URL" ]; then
            echo "❌ DEPLOY_URL is not configured for staging deploy"
            exit 1
          fi

          if [ ! -f scripts/infrastructure/deploy.sh ]; then
            echo "❌ scripts/infrastructure/deploy.sh not found"
            exit 1
          fi

          chmod +x scripts/infrastructure/deploy.sh
          ./scripts/infrastructure/deploy.sh staging

      - name: Staging smoke test
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          echo "🔍 Running staging smoke test..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/v1/health" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Staging health check passed"
          else
            echo "❌ Staging health check failed (HTTP $STATUS)"
            exit 1
          fi
